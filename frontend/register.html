<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protocol Registration | DEXTER AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05070a;
      --surface: #0c0e14;
      --accent: #3b82f6;
      --text: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      position: relative;
    }
    .logo {
      width: 56px; height: 56px; background: linear-gradient(135deg, #3b82f6, #2dd4bf);
      border-radius: 16px; display: grid; place-items: center; font-size: 28px;
      margin: 0 auto 20px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
    }
    h1 { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
    p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; background: #11141d; border: 1px solid var(--border);
      border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.9rem; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    
    .btn {
      width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #2563eb; transform: translateY(-2px); }
    
    .footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .msg { padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 14px; text-align: center; display: none; }
    .msg.error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .msg.success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">🧠</div>
    <h1>Protocol Registration</h1>
    <p class="subtitle">Enroll into DEXTER Neural Network</p>
    
    <form id="register-form">
      <div class="form-group">
        <label>Display Identity</label>
        <input type="text" id="username" placeholder="Operator Name" required>
      </div>
      <div class="form-group">
        <label>System Email</label>
        <input type="email" id="email" placeholder="internal@dexter.ai" required>
      </div>
      <div class="form-group">
        <label>Access Key</label>
        <input type="password" id="password" placeholder="Secure Protocol" required>
      </div>
      <button type="submit" class="btn" id="reg-btn">Register Protocol</button>
      <div class="msg" id="msg"></div>
    </form>
    
    <div class="footer">
      Existing operator? <a href="login.html">Authorize Session</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("register-form");
    const msgEl = document.getElementById("msg");
    const regBtn = document.getElementById("reg-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      
      regBtn.disabled = true;
      regBtn.textContent = "Negotiating...";
      
      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();

        if (res.ok) {
          msgEl.textContent = "Registration Successful. Redirecting...";
          msgEl.style.display = "block";
          msgEl.className = "msg success";
          setTimeout(() => { window.location.href = "login.html"; }, 1000);
        } else {
          msgEl.textContent = data.error || "Registration Failure";
          msgEl.style.display = "block";
          msgEl.className = "msg error";
          regBtn.disabled = false;
          regBtn.textContent = "Register Protocol";
        }
      } catch {
        msgEl.textContent = "Connection Failure";
        msgEl.style.display = "block";
        regBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
