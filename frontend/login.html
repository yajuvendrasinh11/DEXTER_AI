<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – DEXTER AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #1e2130;
      --border: rgba(255,255,255,0.08);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --error: #f87171;
      --success: #4ade80;
      --radius: 16px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at top left, rgba(108,99,255,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at bottom right, rgba(167,139,250,0.1) 0%, transparent 60%);
    }
    .auth-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon { font-size: 3rem; margin-bottom: 8px; }
    .brand h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #6c63ff, #a78bfa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .brand p  { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 16px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .msg { padding: 12px 16px; border-radius: 10px; font-size: 0.88rem; margin-top: 16px; display: none; }
    .msg.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .msg.success { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--text-muted); }
    .footer-link a { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
    .pw-wrap { position: relative; }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; padding: 0; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-icon">🤖</div>
      <h1>DEXTER AI</h1>
      <p>Your intelligent conversation partner</p>
    </div>
    <div class="card">
      <h2>Welcome back 👋</h2>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn" id="login-btn">Sign In</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <div class="footer-link">Don't have an account? <a href="register.html">Register here</a></div>
  </div>

  <script>
    const form    = document.getElementById("login-form");
    const msgEl   = document.getElementById("msg");
    const loginBtn = document.getElementById("login-btn");

    // Check if already logged in
    fetch("/me").then(r => r.json()).then(data => {
      if (data.authenticated) {
        window.location.href = data.role === "admin" ? "admin.html" : "index.html";
      }
    }).catch(() => {});

    document.getElementById("pw-toggle").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = `msg ${type}`;
      msgEl.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) { showMsg("Please fill in all fields.", "error"); return; }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in…";

      try {
        const res  = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok) {
          showMsg("Login successful! Redirecting…", "success");
          setTimeout(() => {
            window.location.href = data.role === "admin" ? "admin.html" : "index.html";
          }, 600);
        } else {
          showMsg(data.error || "Login failed.", "error");
          loginBtn.disabled = false;
          loginBtn.textContent = "Sign In";
        }
      } catch {
        showMsg("Server error. Please try again.", "error");
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
