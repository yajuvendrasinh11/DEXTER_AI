<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – DEXTER AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --card: #1e2130; --border: rgba(255,255,255,0.08);
      --accent: #6c63ff; --accent2: #a78bfa; --text: #e2e8f0; --text-secondary: #94a3b8;
      --text-muted: #64748b; --error: #f87171; --success: #4ade80; --warning: #fbbf24;
      --radius: 14px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    /* Topbar */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; font-size: 1.1rem; font-weight: 800; }
    .topbar-brand span { font-size: 1.5rem; }
    .topbar-brand .badge {
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa); color: #fff;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-chip { font-size: 0.85rem; color: var(--text-secondary); }
    .btn-sm {
      padding: 8px 16px; border-radius: 8px; border: none; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-primary { background: linear-gradient(135deg,#6c63ff,#a78bfa); color:#fff; }
    .btn-danger  { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }
    .page-title span { color: var(--text-muted); font-weight: 400; font-size: 1rem; margin-left: 8px; }
    /* Stats grid */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; display: flex; align-items: center; gap: 16px;
    }
    .stat-icon { font-size: 2rem; }
    .stat-value { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .chart-wrap { height: 220px; }
    /* Users table */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .section-header h3 { font-size: 1rem; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 20px; text-align: left; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--text-muted); background: var(--surface); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(108,99,255,0.04); }
    .badge-role {
      display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    }
    .badge-role.admin { background: rgba(108,99,255,0.2); color: var(--accent2); }
    .badge-role.user  { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    .loading { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.9rem; }
    /* Notifications */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 14px 20px;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      font-size: 0.9rem; font-weight: 600; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 9999; transform: translateY(100px); opacity: 0;
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(74,222,128,0.4); color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.4); color: var(--error); }
  </style>
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      <span>🤖</span> DEXTER AI <span class="badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip">👤 <span id="admin-name">admin</span></span>
      <a href="index.html"><button class="btn-sm btn-outline">💬 Go to Chat</button></a>
      <button class="btn-sm btn-outline" id="btn-logout">🚪 Logout</button>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">Admin Dashboard <span>Overview</span></h1>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value" id="stat-users">—</div><div class="stat-label">Total Users</div></div></div>
      <div class="stat-card"><div class="stat-icon">💬</div><div><div class="stat-value" id="stat-msgs">—</div><div class="stat-label">Total Messages</div></div></div>
      <div class="stat-card"><div class="stat-icon">😊</div><div><div class="stat-value" id="stat-pos">—</div><div class="stat-label">Positive Msgs</div></div></div>
      <div class="stat-card"><div class="stat-icon">⚡</div><div><div class="stat-value" id="stat-rt">—</div><div class="stat-label">Avg Response Time</div></div></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <h3>Sentiment Distribution</h3>
        <div class="chart-wrap"><canvas id="chart-sent"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Messages per Sentiment</h3>
        <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="section-header">
        <h3>⚙️ Admin Actions</h3>
      </div>
      <div style="padding: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn-sm btn-danger" id="btn-reset-analytics">🗑️ Reset All Analytics</button>
        <button class="btn-sm btn-outline" id="btn-refresh">↻ Refresh Data</button>
      </div>
    </div>

    <!-- Users table -->
    <div class="section">
      <div class="section-header">
        <h3>👥 Registered Users</h3>
        <span id="user-count" style="font-size:0.85rem; color:var(--text-muted);"></span>
      </div>
      <div id="users-table-wrap">
        <div class="loading">Loading users…</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let sentimentChart = null;
    let barChart = null;

    function showToast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => { t.className = "toast"; }, 3000);
    }

    // Auth guard
    async function checkAuth() {
      const res  = await fetch("/me");
      const data = await res.json();
      if (!data.authenticated || data.role !== "admin") {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("admin-name").textContent = data.username;
    }

    async function loadStats() {
      const res  = await fetch("/admin/stats");
      if (!res.ok) { showToast("Failed to load stats", "error"); return; }
      const data = await res.json();

      document.getElementById("stat-users").textContent = data.total_users;
      document.getElementById("stat-msgs").textContent  = data.total_messages;
      document.getElementById("stat-pos").textContent   = data.sentiment_counts?.positive ?? 0;
      document.getElementById("stat-rt").textContent    = data.avg_response_time + "s";

      const { positive: pos, negative: neg, neutral: neut } = data.sentiment_counts;
      renderSentimentChart(pos, neg, neut);
      renderBarChart(pos, neg, neut);
    }

    async function loadUsers() {
      const res   = await fetch("/admin/users");
      if (!res.ok) { showToast("Failed to load users", "error"); return; }
      const users = await res.json();
      document.getElementById("user-count").textContent = `${users.length} registered`;

      const wrap = document.getElementById("users-table-wrap");
      if (users.length === 0) { wrap.innerHTML = '<div class="empty">No users registered yet.</div>'; return; }

      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th>Username</th><th>Email</th><th>Role</th>
            <th>Messages</th><th>Last Active</th><th>Joined</th><th>Action</th>
          </tr></thead>
          <tbody>${users.map(u => `
            <tr>
              <td><strong>${u.username}</strong></td>
              <td>${u.email}</td>
              <td><span class="badge-role ${u.role}">${u.role}</span></td>
              <td>${u.message_count}</td>
              <td>${u.last_active || "Never"}</td>
              <td>${u.created_at}</td>
              <td>${u.role !== "admin" ? `<button class="btn-sm btn-danger" onclick="deleteUser('${u.username}')">Delete</button>` : "—"}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
    }

    async function deleteUser(username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
      const res = await fetch(`/admin/delete-user/${username}`, { method: "DELETE" });
      const data = await res.json();
      if (res.ok) { showToast(data.message, "success"); loadUsers(); loadStats(); }
      else { showToast(data.error || "Failed to delete user.", "error"); }
    }

    function renderSentimentChart(pos, neg, neut) {
      const ctx = document.getElementById("chart-sent")?.getContext("2d");
      if (!ctx) return;
      if (sentimentChart) sentimentChart.destroy();
      sentimentChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels: ["Positive 😊", "Negative 😟", "Neutral 😐"],
          datasets: [{ data: [pos, neg, neut], backgroundColor: ["rgba(74,222,128,.85)", "rgba(248,113,113,.85)", "rgba(148,163,184,.85)"], borderColor: ["#4ade80","#f87171","#94a3b8"], borderWidth: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "65%", plugins: { legend: { position: "bottom", labels: { color: "#94a3b8", font: { family: "Inter" }, padding: 14, usePointStyle: true } } } },
      });
    }

    function renderBarChart(pos, neg, neut) {
      const ctx = document.getElementById("chart-bar")?.getContext("2d");
      if (!ctx) return;
      if (barChart) barChart.destroy();
      barChart = new Chart(ctx, {
        type: "bar",
        data: { labels: ["Positive", "Negative", "Neutral"],
          datasets: [{ label: "Messages", data: [pos, neg, neut], backgroundColor: ["rgba(74,222,128,.7)", "rgba(248,113,113,.7)", "rgba(148,163,184,.7)"], borderColor: ["#4ade80","#f87171","#94a3b8"], borderWidth: 2, borderRadius: 8, borderSkipped: false }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(255,255,255,.05)" } }, y: { ticks: { color: "#94a3b8", stepSize: 1, precision: 0 }, grid: { color: "rgba(255,255,255,.05)" }, beginAtZero: true } } },
      });
    }

    document.getElementById("btn-logout").addEventListener("click", async () => {
      await fetch("/logout", { method: "POST" });
      window.location.href = "login.html";
    });

    document.getElementById("btn-refresh").addEventListener("click", () => { loadStats(); loadUsers(); showToast("Data refreshed!", "success"); });

    document.getElementById("btn-reset-analytics").addEventListener("click", async () => {
      if (!confirm("Reset all analytics? This cannot be undone.")) return;
      const res = await fetch("/admin/reset-analytics", { method: "POST" });
      const data = await res.json();
      if (res.ok) { showToast("Analytics reset!", "success"); loadStats(); }
      else { showToast(data.error || "Failed.", "error"); }
    });

    // Init
    (async () => {
      await checkAuth();
      await Promise.all([loadStats(), loadUsers()]);
    })();
  </script>
</body>
</html>
